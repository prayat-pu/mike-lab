<!-- Search Modal -->
<div id="searchModal" class="fixed inset-0 z-[110] hidden items-start justify-center p-4 sm:p-6 bg-slate-900/40 backdrop-blur-sm opacity-0 transition-opacity duration-300">
    <div class="bg-white rounded-2xl shadow-2xl max-w-2xl w-full overflow-hidden transform scale-95 transition-transform duration-300 mt-10 md:mt-20 flex flex-col max-h-[70vh]">
        
        <!-- Search Header -->
        <div class="p-4 border-b border-slate-100 flex flex-col gap-4">
            <div class="flex items-center gap-3">
                <svg class="w-6 h-6 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                <input type="text" id="searchInput" placeholder="Search members, news, publications..." class="flex-grow py-2 text-lg text-slate-700 placeholder-slate-400 focus:outline-none" autocomplete="off">
                <button onclick="closeSearchModal()" class="p-2 text-slate-400 hover:text-accent transition-colors">
                    <kbd class="hidden sm:inline-block px-2 py-1 text-xs font-semibold text-slate-500 bg-slate-100 border border-slate-200 rounded-lg">ESC</kbd>
                    <svg class="sm:hidden w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>

            <!-- Filters -->
            <div class="flex flex-wrap items-center gap-2" id="searchFilters">
                <button data-filter="all" class="search-filter-btn px-4 py-1.5 rounded-full text-xs font-bold uppercase tracking-widest transition-all bg-accent text-white">All</button>
                <button data-filter="members" class="search-filter-btn px-4 py-1.5 rounded-full text-xs font-bold uppercase tracking-widest transition-all bg-slate-100 text-slate-500 hover:bg-blue-50 hover:text-blue-600">Members</button>
                <button data-filter="news" class="search-filter-btn px-4 py-1.5 rounded-full text-xs font-bold uppercase tracking-widest transition-all bg-slate-100 text-slate-500 hover:bg-emerald-50 hover:text-emerald-600">News</button>
                <button data-filter="publications" class="search-filter-btn px-4 py-1.5 rounded-full text-xs font-bold uppercase tracking-widest transition-all bg-slate-100 text-slate-500 hover:bg-indigo-50 hover:text-indigo-600">Publications</button>
            </div>
        </div>

        <!-- Search Results -->
        <div id="searchResults" class="flex-grow overflow-y-auto p-4 space-y-2">
            <!-- Results will be injected here -->
            <p class="text-center text-slate-400 py-10 font-medium">Type to search for content...</p>
        </div>

        <!-- Search Footer -->
        <div class="p-3 bg-slate-50 border-t border-slate-100 flex items-center justify-between text-[10px] font-bold text-slate-400 uppercase tracking-widest px-6">
            <div class="flex items-center gap-4">
                <span class="flex items-center gap-1"><span class="w-2 h-2 rounded-full bg-blue-400"></span> Members</span>
                <span class="flex items-center gap-1"><span class="w-2 h-2 rounded-full bg-emerald-400"></span> News</span>
                <span class="flex items-center gap-1"><span class="w-2 h-2 rounded-full bg-indigo-400"></span> Publications</span>
            </div>
            <span id="resultsCount" class="hidden">0 results found</span>
        </div>
    </div>
</div>
