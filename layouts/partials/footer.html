                <img src="{{ "images/logo/Logo_MIKE_LightBG.png" | relURL }}" alt="MIKE Lab Logo" class="h-8 md:h-14 w-auto object-contain">
            </h5>
            <p class="font-medium text-slate-600">Machine Intelligence &<br>Knowledge Engineering Research Clusters</p>
        </div>
        <div>
            <h6 class="font-bold text-deep-charcoal mb-4 academic-h2 text-xs uppercase tracking-widest">Location</h6>
            <p>{{ .Site.Params.lab_location }}</p>
            <a href="mailto:{{ .Site.Params.contact_email }}" class="text-accent hover:text-blue-800 font-semibold mt-2 inline-block break-all">

        <div>
            <h6 class="font-bold text-deep-charcoal mb-4 academic-h2 text-xs uppercase tracking-widest">Connect</h6>
            <div class="space-y-3 font-medium text-slate-600">
                <a href="https://www.linkedin.com/company/mu-mike/" target="_blank" class="flex items-center gap-2 hover:text-accent transition-colors">
                    <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.761 0 5-2.239 5-5v-14c0-2.761-2.239-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z"/></svg>
                    LinkedIn
                </a>
                <a href="#" class="flex items-center gap-2 hover:text-accent transition-colors">
                    <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 15h-2v-6h2v6zm-1-7c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1zm5 7h-2v-6h2v6zm-1-7c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1z"/></svg>
                    Google Scholar

    <div class="max-w-7xl mx-auto mt-16 border-t border-gray-100 pt-8 flex flex-col md:flex-row items-center justify-between text-xs font-medium text-gray-400 text-center md:text-left">
        <p>&copy; {{ now.Format "2006" }} MIKE Research Clusters. All rights reserved.</p>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script>
    const mobileBtn = document.getElementById('mobile-menu-btn');
    const mobileMenu = document.getElementById('mobile-menu');
    const mobileLinks = mobileMenu.querySelectorAll('.mobile-link');
    const backdrop = document.getElementById('mobile-menu-backdrop');

    function toggleMenu() {
        mobileMenu.classList.toggle('hidden');
        backdrop.classList.toggle('hidden');
        document.body.classList.toggle('overflow-hidden');
    }

    function closeMenu() {
        if (mobileMenu) mobileMenu.classList.add('hidden');
        if (backdrop) backdrop.classList.add('hidden');
        document.body.classList.remove('overflow-hidden');
    }

    if (mobileBtn) {
        mobileBtn.addEventListener('click', (event) => {
            event.stopPropagation();
            toggleMenu();
        });
    }

    mobileLinks.forEach(link => {
        link.addEventListener('click', closeMenu);
    });

    if (backdrop) {
        backdrop.addEventListener('click', closeMenu);
    }

    function openJoinModal() {
        const modal = document.getElementById('joinModal');
        if (!modal) {
            // If on a page without modal, redirect to home with anchor
            window.location.href = "{{ "" | relURL }}#join";
            return;
        }
        const modalInner = modal.querySelector('div');
        
        modal.classList.remove('hidden');
        modal.classList.add('flex');
        
        setTimeout(() => {
            modal.classList.remove('opacity-0');
            modalInner.classList.remove('scale-95');
            modalInner.classList.add('scale-100');
        }, 10);
    }

    function closeJoinModal() {
        const modal = document.getElementById('joinModal');
        if (!modal) return;
        const modalInner = modal.querySelector('div');
        
        modal.classList.add('opacity-0');
        modalInner.classList.remove('scale-100');
        modalInner.classList.add('scale-95');
        
        setTimeout(() => {
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }, 300);
    }

    const joinModal = document.getElementById('joinModal');
    if (joinModal) {
        joinModal.addEventListener('click', function(e) {
            if (e.target === this) {
                closeJoinModal();
            }
        });
    }

    let searchIndex = null;

    async function openSearchModal() {
        const modal = document.getElementById('searchModal');
        const modalInner = modal.querySelector('div');
        const input = document.getElementById('searchInput');
        
        modal.classList.remove('hidden');
        modal.classList.add('flex');
        
        // Focus input after animation
        setTimeout(() => {
            modal.classList.remove('opacity-0');
            modalInner.classList.remove('scale-95');
            modalInner.classList.add('scale-100');
            input.focus();
        }, 10);

        // Fetch index if not already loaded
        if (!searchIndex) {
            try {
                const response = await fetch('{{ "index.json" | absURL }}');
                searchIndex = await response.json();
            } catch (err) {
                console.error("Failed to load search index:", err);
            }
        }
    }

    function closeSearchModal() {
        const modal = document.getElementById('searchModal');
        const modalInner = modal.querySelector('div');
        
        modal.classList.add('opacity-0');
        modalInner.classList.remove('scale-100');
        modalInner.classList.add('scale-95');
        
        setTimeout(() => {
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }, 300);
    }

    // Keyboard shortcuts
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') closeSearchModal();
        if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
            e.preventDefault();
            openSearchModal();
        }
    });

    // Search Logic
    const searchInput = document.getElementById('searchInput');
    const searchResults = document.getElementById('searchResults');
    const resultsCount = document.getElementById('resultsCount');
    const filterBtns = document.querySelectorAll('.search-filter-btn');
    let currentFilter = 'all';

    if (searchInput) {
        searchInput.addEventListener('input', () => performSearch());
    }

    filterBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            currentFilter = btn.getAttribute('data-filter');
            
            // Update UI
            filterBtns.forEach(b => {
                b.classList.remove('bg-accent', 'text-white');
                b.classList.add('bg-slate-100', 'text-slate-500');
            });
            btn.classList.remove('bg-slate-100', 'text-slate-500');
            btn.classList.add('bg-accent', 'text-white');
            
            performSearch();
        });
    });

    function performSearch() {
        const query = searchInput.value.toLowerCase().trim();
        if (!query) {
            searchResults.innerHTML = '<p class="text-center text-slate-400 py-10 font-medium">Type to search for content...</p>';
            resultsCount.classList.add('hidden');
            return;
        }

        if (!searchIndex) return;

        let results = searchIndex.filter(item => {
            const matchesQuery = item.title.toLowerCase().includes(query) || 
                               item.summary.toLowerCase().includes(query) ||
                               item.role.toLowerCase().includes(query) ||
                               (item.authors && item.authors.some(a => a.toLowerCase().includes(query)));
            
            if (currentFilter === 'all') return matchesQuery;
            return matchesQuery && item.section === currentFilter;
        });

        renderResults(results);
    }

    function renderResults(results) {
        if (results.length === 0) {
            searchResults.innerHTML = '<p class="text-center text-slate-400 py-10 font-medium">No results found matching your search.</p>';
            resultsCount.innerText = "0 results found";
            resultsCount.classList.remove('hidden');
            return;
        }

        resultsCount.innerText = `${results.length} result${results.length > 1 ? 's' : ''} found`;
        resultsCount.classList.remove('hidden');

        searchResults.innerHTML = results.map(item => {
            let sectionColor = "bg-blue-400";
            if (item.section === "news") sectionColor = "bg-emerald-400";
            if (item.section === "publications") sectionColor = "bg-indigo-400";

            return `
                <a href="${item.permalink}" class="block p-4 hover:bg-blue-50/50 rounded-xl transition-colors border border-transparent hover:border-blue-100 group">
                    <div class="flex items-start gap-4">
                        <div class="w-1.5 h-10 rounded-full ${sectionColor} mt-1 flex-shrink-0"></div>
                        <div class="flex-grow min-w-0">
                            <div class="flex items-center gap-2 mb-1">
                                <span class="text-[10px] font-bold uppercase tracking-widest text-slate-400">${item.section}</span>
                                <span class="text-[10px] text-slate-300">•</span>
                                <span class="text-[10px] font-medium text-slate-400">${item.date}</span>
                            </div>
                            <h4 class="text-base font-bold text-slate-900 group-hover:text-accent transition-colors truncate">${item.title}</h4>
                            <p class="text-xs text-slate-500 line-clamp-1 mt-1 font-light">${item.summary}</p>
                        </div>
                        <div class="self-center opacity-0 group-hover:opacity-100 transition-opacity">
                            <svg class="w-5 h-5 text-accent" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                        </div>
                    </div>
                </a>
            `;
        }).join('');
    }

    // Modal Background Clicks
    const searchModal = document.getElementById('searchModal');
    if (searchModal) {
        searchModal.addEventListener('click', function(e) {
            if (e.target === this) {
                closeSearchModal();
            }
        });
    }
</script>
