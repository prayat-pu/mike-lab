<!DOCTYPE html>
<html lang="en">
<head>
    {{ partial "head.html" . }}
</head>
<body class="antialiased min-h-screen flex flex-col selection:bg-blue-200 selection:text-blue-900">

    {{ partial "nav.html" . }}

    <main class="flex-grow max-w-4xl mx-auto px-4 md:px-6 py-10 md:py-16 w-full">
        <article class="bg-white rounded-3xl p-8 md:p-12 border border-blue-50 shadow-sm">
            <h1 class="text-3xl md:text-5xl font-extrabold text-slate-900 mb-8 display-font tracking-tight">{{ .Title }}</h1>
            <div class="prose prose-slate max-w-none">
                {{ .Content }}
            </div>
        </article>
    </main>

    {{ partial "join_modal.html" . }}
    {{ partial "search_modal.html" . }}
    {{ partial "footer.html" . }}
</body>
</html>
