<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .Title }} | MIKE Research Clusters</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;800&family=Plus+Jakarta+Sans:wght@300;400;600&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #fbfdff; color: #1e293b; }
        h1, h2, h3, .display-font { font-family: 'Outfit', sans-serif; }
        .text-accent { color: #004B87; }
        .glass-panel { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
        
        /* Mobile-First Typography for Article Body */
        .academic-prose p { margin-bottom: 1.25rem; line-height: 1.8; font-weight: 300; color: #334155; font-size: 1rem; }
        .academic-prose h2, .academic-prose h3 { font-family: 'Outfit', sans-serif; font-weight: 700; color: #0f172a; margin-top: 2rem; margin-bottom: 1rem; }
        .academic-prose h2 { font-size: 1.5rem; border-bottom: 1px solid #e2e8f0; padding-bottom: 0.5rem; }
        .academic-prose a { color: #004B87; text-decoration: underline; font-weight: 600; text-underline-offset: 2px; }
        .academic-prose ul { list-style-type: disc; padding-left: 1.25rem; margin-bottom: 1.5rem; color: #334155; }
        .academic-prose strong { font-weight: 600; color: #1e293b; }
        
        /* Scale up text for tablets and desktops */
        @media (min-width: 768px) {
            .academic-prose p { font-size: 1.1rem; margin-bottom: 1.5rem; }
            .academic-prose h2 { font-size: 1.8rem; margin-top: 2.5rem; }
            .academic-prose ul { padding-left: 1.5rem; }
        }
    </style>
</head>
<body class="antialiased min-h-screen flex flex-col selection:bg-accent selection:text-white">

    <nav class="sticky top-0 z-50 glass-panel border-b border-blue-50/50 shadow-sm transition-all duration-300">
        <div class="max-w-7xl mx-auto py-4 px-4 md:px-6 flex items-center justify-between">
            <a href="{{ "news" | relURL }}" class="text-sm font-bold text-accent uppercase tracking-widest flex items-center gap-2 hover:opacity-80 transition-opacity">&larr; Back to News</a>
        </div>
    </nav>

    <main class="flex-grow max-w-3xl mx-auto px-4 md:px-6 py-10 md:py-16 w-full">
        <header class="mb-8 md:mb-12 text-center">
            
            <div class="flex flex-wrap items-center justify-center gap-2 md:gap-3 mb-4 md:mb-6">
                <span class="text-xs font-bold uppercase tracking-widest px-3 py-1 bg-blue-50 text-accent rounded-md">{{ .Date.Format "January 02, 2006" }}</span>
                {{ with .Params.categories }}<span class="text-xs font-bold uppercase tracking-widest text-slate-400">#{{ index . 0 }}</span>{{ end }}
            </div>
            
            <h1 class="text-3xl sm:text-4xl md:text-5xl font-extrabold text-slate-900 tracking-tight display-font leading-tight">{{ .Title }}</h1>
        </header>

        {{ if .Params.image }}
            {{ $img := .Params.image }}
            <div class="w-full aspect-video md:aspect-[16/9] rounded-2xl md:rounded-3xl overflow-hidden mb-8 md:mb-12 shadow-lg shadow-blue-900/5">
                {{ if hasPrefix $img "http" }}
                    <img src="{{ $img }}" class="w-full h-full object-cover">
                {{ else }}
                    <img src="{{ trim $img "/" | absURL }}" class="w-full h-full object-cover">
                {{ end }}
            </div>
        {{ end }}

        <article class="academic-prose">
            {{ .Content }}
        </article>
    </main>

    <footer class="bg-white border-t border-blue-50 py-8 px-4 md:px-6 text-center text-xs text-slate-400 mt-auto font-medium">&copy; 2026 MIKE Research Clusters.</footer>
</body>
</html>
